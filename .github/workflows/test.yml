name: Test

on:
  push:
    paths-ignore:
      - "README.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - ".gitattributes"
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/**"
      - ".vscode/**"
      - "master.pdf"
  pull_request:
    paths-ignore:
      - "README.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - ".gitattributes"
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/**"
      - ".vscode/**"
      - "master.pdf"
  workflow_dispatch:

env:
  TEXLIVE_CACHE_VERSION: tl2026-2026-04-08-v1
  CORE_PKGS: scheme-basic tools amsmath amsfonts
  XECJK_PKGS: fontspec xecjk ulem iftex
  BIB_PKGS: biblatex biblatex-gb7714-2015 biber
  BIN_PKGS: latexmk l3build
  REQUIRED_PKGS: >-
    algorithmicx algorithms appendix bookmark booktabs caption catchfile
    enumitem etoolbox fancyhdr float geometry ifplatform koma-script
    listings makecell multirow nomencl ntheorem pdfpages pgf
    silence titlesec wrapfig xcolor xkeyval xstring
  FONT_PKGS: fandol tex-gyre dejavu

jobs:

  build:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          packages: >-
            ${{ env.CORE_PKGS }} ${{ env.XECJK_PKGS }} ${{ env.BIB_PKGS }}
            ${{ env.REQUIRED_PKGS }} ${{ env.FONT_PKGS }}
            ${{ env.BIN_PKGS }}
          texlive_version: 2026
          cache_version: ${{ env.TEXLIVE_CACHE_VERSION }}

      - name: Build document
        run: make

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v6
        with:
          name: nwputhesis-pdf
          path: master.pdf
          retention-days: 30

  test-ubuntu:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    steps:
      - uses: actions/checkout@v6

      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          packages: >-
            ${{ env.CORE_PKGS }} ${{ env.XECJK_PKGS }} ${{ env.BIB_PKGS }}
            ${{ env.REQUIRED_PKGS }} ${{ env.FONT_PKGS }}
            ${{ env.BIN_PKGS }}
          texlive_version: 2026
          cache_version: ${{ env.TEXLIVE_CACHE_VERSION }}

      - name: Run regression tests
        run: make test

      - name: Upload test results if failed
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: test-result-ubuntu-latest
          path: |
            build/test
            build/test-testfiles

  build-cross-platform:
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          packages: >-
            ${{ env.CORE_PKGS }} ${{ env.XECJK_PKGS }} ${{ env.BIB_PKGS }}
            ${{ env.REQUIRED_PKGS }} ${{ env.FONT_PKGS }}
            ${{ env.BIN_PKGS }}
          texlive_version: 2026
          cache_version: ${{ env.TEXLIVE_CACHE_VERSION }}

      - name: Build document
        run: |
          sed -i 's/fontset = auto/fontset = fandol/g' master.tex
          make
